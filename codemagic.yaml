workflows:
  ios-build:
    name: iOS Build (Unsigned)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

      - name: Convert to IPA
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          zip -r ../ipa/Runner.ipa Runner.app

    artifacts:
      - build/ios/ipa/*.ipa
