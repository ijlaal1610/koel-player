workflows:
  ios-build:
    name: iOS Build (Unsigned)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - build/

    scripts:
      - name: Setup Flutter
        script: |
          flutter clean
          flutter pub get

      - name: Build iOS (No Code Sign)
        script: |
          flutter build ios --release --no-codesign

      - name: Create Proper IPA
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos

          # Clean old files
          rm -rf Payload
          rm -f Runner.ipa

          # Create correct structure
          mkdir Payload
          mv Runner.app Payload/

          # ZIP THE PAYLOAD FOLDER (IMPORTANT)
          zip -r Runner.ipa Payload

          # Move IPA
          mv Runner.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa
