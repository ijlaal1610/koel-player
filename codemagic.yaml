workflows:
  build-all:
    name: Build APK + IPA (Final)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - build/

    scripts:
      - name: Setup Flutter
        script: |
          flutter clean
          flutter pub get

      # ---------------- ANDROID ----------------
      - name: Build APK (Release)
        script: |
          flutter build apk --release

      # ---------------- IOS ----------------
      - name: Build iOS (No Code Sign)
        script: |
          flutter build ios --release --no-codesign

      - name: Create Proper IPA (Fixed Structure)
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos

          # Clean previous if exists
          rm -rf Payload
          rm -f Runner.ipa

          # Create correct structure
          mkdir Payload
          mv Runner.app Payload/

          # Zip into IPA
          cd Payload
          zip -r ../Runner.ipa .
          cd ..

          # Move IPA to output folder
          mv Runner.ipa ../ipa/

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/ipa/*.ipa
