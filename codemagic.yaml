workflows:
  ios-build:
    name: iOS Build (Unsigned)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - build/

    scripts:
      - name: Setup Flutter
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          flutter pub get

      - name: Force iOS Deployment Target (Working)
        script: |
          perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS (No Code Sign)
        script: |
          flutter build ios --release --no-codesign

      - name: Create Proper IPA
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos

          rm -rf Payload
          rm -f Runner.ipa

          mkdir Payload
          mv Runner.app Payload/

          zip -r Runner.ipa Payload

          mv Runner.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa
